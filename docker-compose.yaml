services:
  broker:
    build: ./broker
    container_name: broker
    command: ["python", "broker.py"]

  proxy:
    build: ./broker
    container_name: proxy
    command: ["python", "proxy.py"]

  referencia:
    build: ./python
    container_name: referencia
    command: ["python", "referencia.py"]
    ports:
      - "5560:5560"

  server_python:
    build: ./python
    container_name: server_python
    command: ["python", "server.py"]
    volumes:
      - ./data/python:/app/data
      - ./data/shared:/app/shared
    depends_on:
      - broker
      - proxy
      - referencia

  server_java:
    build: ./java
    container_name: server_java
    command: ["java", "-cp", ".:jeromq-0.5.2.jar:msgpack-core-0.9.0.jar", "Server"]
    volumes:
      - ./data/java:/app/data
      - ./data/shared:/app/shared
    depends_on:
      - broker
      - proxy
      - referencia

  server_c:
    build: ./c
    container_name: server_c
    command: ["./server"]
    volumes:
      - ./data/c:/app/data
      - ./data/shared:/app/shared
    depends_on:
      - broker
      - proxy
      - referencia

  client_python:
    build: ./python
    container_name: client_python
    command: ["python", "client.py"]
    depends_on:
      - broker
      - proxy
      - server_python

  client_java:
    build: ./java
    container_name: client_java
    command: ["java", "-cp", ".:jeromq-0.5.2.jar:msgpack-core-0.9.0.jar", "Client"]
    depends_on:
      - broker
      - proxy
      - server_java

  client_c:
    build: ./c
    container_name: client_c
    command: ["./client"]
    depends_on:
      - broker
      - proxy
      - server_c