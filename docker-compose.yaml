services:
  broker:
    build: ./broker
    container_name: broker
    command: ["python", "broker.py"]

  server_python:
   build: ./python
   container_name: server_python
   command: ["python", "server.py"]
   environment:
     SERVER_ID: server_python
     DB_PATH: /app/data/server_python.db
     PUB_PORT: "7000"
     PEER_PUBS: tcp://server_java:7001,tcp://server_c:7002
   volumes:
     - ./data/python:/app/data
   depends_on:
     - broker

  
