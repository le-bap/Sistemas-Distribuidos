  client_python:
    build: ./python
    container_name: client_python
    command: ["python", "client.py"]
    environment:
      CLIENT_USER: bot_python
      START_DELAY: "6"
      CHANNEL_TO_CREATE: geral
    depends_on:
      - broker
      - server_python
